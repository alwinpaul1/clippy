<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="clip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#29A9F4"/>
      <stop offset="1" stop-color="#0062A8"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="1024" height="1024" rx="228" fill="#FFFFFF"/>

  <!-- Bigger paperclip, blue→purple gradient (the original palette) so it pops on white -->
  <g transform="translate(512 500) scale(1.05) translate(-512 -512)">
    <g transform="rotate(-8 512 512)"
       fill="none" stroke="url(#clip)" stroke-width="74"
       stroke-linecap="round" stroke-linejoin="round">
      <rect x="356" y="236" width="312" height="600" rx="156"/>
      <rect x="430" y="236" width="164" height="452" rx="82"/>
    </g>
    <g>
      <circle cx="470" cy="356" r="54" fill="#FFFFFF" stroke="#1E2A5A" stroke-width="10"/>
      <circle cx="479" cy="366" r="26" fill="#1E2A5A"/>
      <circle cx="468" cy="356" r="9" fill="#FFFFFF"/>
      <circle cx="588" cy="335" r="54" fill="#FFFFFF" stroke="#1E2A5A" stroke-width="10"/>
      <circle cx="597" cy="345" r="26" fill="#1E2A5A"/>
      <circle cx="586" cy="335" r="9" fill="#FFFFFF"/>
    </g>
  </g>
</svg>
