name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: "3.44.4"

jobs:
  app:
    name: App — analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test # includes the in-process relay integration tests

  relay:
    name: Relay — analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - working-directory: server
        run: dart pub get
      - working-directory: server
        run: dart analyze
      - working-directory: server
        run: dart test

  deploy-relay:
    name: Deploy relay to Railway
    needs: [app, relay]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm i -g @railway/cli
      - name: Deploy (no-op until RAILWAY_TOKEN is set)
        working-directory: server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::notice::RAILWAY_TOKEN not set — skipping deploy."
            echo "Add a Railway project token as the RAILWAY_TOKEN repo secret to enable auto-deploy."
            exit 0
          fi
          railway up --ci --service clippy-relay
