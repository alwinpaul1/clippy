name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  FLUTTER_VERSION: "3.44.4"

jobs:
  # ---- Gates: tests must pass before anything ships ----
  app:
    name: App — analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test # includes the in-process relay integration tests

  relay:
    name: Relay — analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - working-directory: server
        run: dart pub get
      - working-directory: server
        run: dart analyze
      - working-directory: server
        run: dart test

  # ---- Build the distributable binaries (only after the app gate passes) ----
  build-android:
    name: Build Android APK
    needs: [app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      # super_clipboard's cargokit falls back to a Rust source build if the
      # precompiled binary download fails; a toolchain avoids that flake.
      - uses: dtolnay/rust-toolchain@stable
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-macos:
    name: Build macOS app
    needs: [app]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Zip the app
        run: ditto -c -k --keepParent build/macos/Build/Products/Release/clippy.app Clippy-macOS.zip
      - uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: Clippy-macOS.zip
          if-no-files-found: error

  # ---- Deploy relay + download page + fresh builds to Railway ----
  deploy:
    name: Deploy to Railway
    needs: [app, relay, build-android, build-macos]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: _dl
      - uses: actions/download-artifact@v4
        with:
          name: macos-zip
          path: _dl
      - name: Stage builds for hosting
        run: |
          mkdir -p server/web/downloads
          cp _dl/app-release.apk server/web/downloads/Clippy-Android.apk
          cp _dl/Clippy-macOS.zip server/web/downloads/Clippy-macOS.zip
          ls -la server/web/downloads
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm i -g @railway/cli
      - name: Deploy (relay + page + builds)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::notice::RAILWAY_TOKEN not set — skipping deploy. Add a Railway"
            echo "project token as the RAILWAY_TOKEN repo secret to enable auto-deploy."
            exit 0
          fi
          # railway up uploads the working dir (trimmed by .railwayignore), which
          # now includes the freshly-built binaries in server/web/downloads/.
          railway up --ci --service clippy-relay
