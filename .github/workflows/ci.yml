name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  FLUTTER_VERSION: "3.44.4"

jobs:
  # ---- Gates: tests must pass before anything ships ----
  app:
    name: App — analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test # includes the in-process relay integration tests

  relay:
    name: Relay — analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - working-directory: server
        run: dart pub get
      - working-directory: server
        run: dart analyze
      - working-directory: server
        run: dart test

  # ---- Build the distributable binaries (only after the app gate passes) ----
  build-android:
    name: Build Android APK
    needs: [app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      # super_clipboard's cargokit falls back to a Rust source build if the
      # precompiled binary download fails; a toolchain avoids that flake.
      - uses: dtolnay/rust-toolchain@stable
      - run: flutter pub get
      - name: Decode release keystore (if configured)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/clippy-release.jks"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/clippy-release.jks" >> "$GITHUB_ENV"
            echo "Release keystore configured — build will be release-signed."
          else
            echo "No release keystore secret set — falling back to debug signing."
          fi
      - name: Build APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: flutter build apk --release
      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-macos:
    name: Build macOS app
    needs: [app]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package as DMG (drag-to-Applications)
        run: |
          mkdir dmg
          cp -R build/macos/Build/Products/Release/clippy.app "dmg/Clippy.app"
          ln -s /Applications dmg/Applications
          hdiutil create -volname Clippy -srcfolder dmg -ov -format UDZO Clippy-macOS.dmg
      - name: Zip the .app (for in-app self-update)
        run: ditto -c -k --keepParent build/macos/Build/Products/Release/clippy.app Clippy-macOS.zip
      - uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: |
            Clippy-macOS.dmg
            Clippy-macOS.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows app
    needs: [app]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      # super_clipboard's cargokit builds Rust on Windows too.
      - uses: dtolnay/rust-toolchain@stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Build installer (Inno Setup, preinstalled on the runner)
        shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" windows\installer.iss'
      - uses: actions/upload-artifact@v7
        with:
          name: windows-setup
          path: Clippy-Setup.exe
          if-no-files-found: error

  # ---- Deploy relay + download page + fresh builds to Railway ----
  deploy:
    name: Deploy to Railway
    needs: [app, relay, build-android, build-macos, build-windows]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: android-apk
          path: _dl
      - uses: actions/download-artifact@v8
        with:
          name: macos-dmg
          path: _dl
      - uses: actions/download-artifact@v8
        with:
          name: windows-setup
          path: _dl
      - name: Stage builds for hosting
        run: |
          mkdir -p server/web/downloads
          cp _dl/app-release.apk server/web/downloads/Clippy-Android.apk
          cp _dl/Clippy-macOS.dmg server/web/downloads/Clippy-macOS.dmg
          cp _dl/Clippy-macOS.zip server/web/downloads/Clippy-macOS.zip
          cp _dl/Clippy-Setup.exe server/web/downloads/Clippy-Setup.exe
          ls -la server/web/downloads
      - name: Generate update manifest (version.json)
        run: |
          VER=$(grep -E '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | tr -d '[:space:]')
          SEMVER=${VER%%+*}; BUILD=${VER##*+}
          python3 - "$SEMVER" "$BUILD" <<'PY'
          import json, sys
          notes = json.load(open('release.json'))['notes']
          json.dump({
              'version': sys.argv[1], 'build': int(sys.argv[2]), 'notes': notes,
              'android': '/download/Clippy-Android.apk',
              'macos':   '/download/Clippy-macOS.zip',
              'windows': '/download/Clippy-Setup.exe',
          }, open('server/web/downloads/version.json', 'w'))
          print(open('server/web/downloads/version.json').read())
          PY
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm i -g @railway/cli
      - name: Deploy (relay + page + builds)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::notice::RAILWAY_TOKEN not set — skipping deploy. Add a Railway"
            echo "project token as the RAILWAY_TOKEN repo secret to enable auto-deploy."
            exit 0
          fi
          # Upload DETACHED, then verify for real (below). With --ci the CLI
          # attaches to Railway's build-log stream and derives its exit code from
          # it — so a flaky stream ("Failed to stream build logs") makes it exit 1
          # even when the deploy succeeds (it can't read the terminal status, so
          # it fails pessimistically). --detach returns once the build is queued
          # and can't be tripped by the stream. --no-gitignore is REQUIRED: newer
          # railway CLIs honour .gitignore (which excludes server/web/downloads/,
          # the CI-staged artifacts), so without it the download files + version
          # .json are dropped and every /download 404s. .railwayignore still
          # trims build/, .dart_tool/, the Flutter app dirs, etc.
          railway up --detach --no-gitignore --service clippy-relay

          # Trust the served result, not the CLI: poll version.json until the
          # relay serves the version we just built (the artifacts + manifest are
          # part of this same upload). Fails only if it never goes live.
          EXPECT=$(grep -E '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d'+' -f1 | tr -d '[:space:]')
          URL="https://clippy-relay-production.up.railway.app/version.json"
          echo "Waiting for relay to serve $EXPECT ..."
          for i in $(seq 1 40); do
            GOT=$(curl -fsS "$URL" 2>/dev/null | python3 -c "import sys,json;print(json.load(sys.stdin).get('version',''))" 2>/dev/null || true)
            echo "  poll $i: served=${GOT:-<none>} expect=$EXPECT"
            if [ "$GOT" = "$EXPECT" ]; then
              echo "::notice::Deploy verified — relay serving $EXPECT"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Relay did not serve $EXPECT within ~10 min — deploy may have failed."
          exit 1
