name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pin to the Flutter version used locally so CI matches dev.
env:
  FLUTTER_VERSION: "3.44.4"

jobs:
  analyze-test:
    name: Analyze & test (Dart)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  firestore-rules:
    name: Firestore security rules (emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: npm i -g firebase-tools
      - name: Install rules-test deps
        working-directory: test/firestore_rules
        run: npm install
      - name: Run rules tests on the emulator
        run: firebase emulators:exec --project demo-clippy 'cd test/firestore_rules && npm test'

  deploy-rules:
    name: Deploy Firestore rules
    needs: [analyze-test, firestore-rules]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm i -g firebase-tools
      - name: Deploy (no-op until secrets are set)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ] || [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "::notice::FIREBASE_TOKEN / FIREBASE_PROJECT_ID not set — skipping deploy."
            echo "Add them in repo Settings → Secrets and variables → Actions to enable auto-deploy of Firestore rules."
            exit 0
          fi
          firebase deploy --only firestore:rules \
            --project "$FIREBASE_PROJECT_ID" --token "$FIREBASE_TOKEN" --non-interactive
